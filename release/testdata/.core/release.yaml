version: 1

project:
  name: myapp
  repository: owner/repo

build:
  targets:
    - os: linux
      arch: amd64
    - os: linux
      arch: arm64
    - os: darwin
      arch: amd64
    - os: darwin
      arch: arm64
    - os: windows
      arch: amd64

publishers:
  - type: github
    prerelease: false
    draft: false

changelog:
  include:
    - feat
    - fix
    - perf
  exclude:
    - chore
    - docs
    - style
    - test
    - ci
